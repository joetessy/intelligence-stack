# =============================================================================
# Intelligence Stack
# Services: SearXNG · FlareSolverr · Open WebUI · Faster-Whisper (STT)
#           openedai-speech (TTS) · Dashboard
# Native on host:
#   Ollama  → http://localhost:11434  (GGUF models, auto-unloads after 5m)
#   MLX-LM  → http://localhost:5001   (MLX models, auto-starts via LaunchAgent)
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Status:  ./status.sh
# Logs:    docker compose logs -f [service]
# MLX log: /tmp/mlx-server.log
#
# UIs:
#   Open WebUI   → http://localhost:3000
#   Dashboard    → http://localhost:3001
#   SearXNG      → http://localhost:8080
#   FlareSolverr → internal only (Docker DNS: flaresolverr:8191, no host port)
# =============================================================================

services:

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - LOG_LEVEL=warning
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    networks:
      - ai-stack

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - SEARXNG_HOST=0.0.0.0
      - SEARXNG_PORT=8080
    depends_on:
      flaresolverr:
        condition: service_healthy
    networks:
      - ai-stack

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: faster-whisper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      - WHISPER__MODEL=small.en
    networks:
      - ai-stack

  openedai-speech:
    image: ghcr.io/matatonic/openedai-speech:latest
    container_name: openedai-speech
    restart: unless-stopped
    ports:
      - "127.0.0.1:8880:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    volumes:
      - openedai-speech-voices:/app/voices
      - openedai-speech-config:/app/config
    environment:
      - TTS_HOME=/app/voices
      - HF_HOME=/app/voices
    networks:
      - ai-stack

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://faster-whisper:8000/v1
      - AUDIO_STT_OPENAI_API_KEY=none
      - AUDIO_STT_MODEL=small.en
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://openedai-speech:8000/v1
      - AUDIO_TTS_OPENAI_API_KEY=none
      - AUDIO_TTS_MODEL=tts-1
      - AUDIO_TTS_VOICE=nova
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_API_KEYS=true
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE_URL=http://host.docker.internal:5001/v1
      - OPENAI_API_KEY=mlx-local
      - ENABLE_MODEL_FILTER=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      searxng:
        condition: service_healthy
      faster-whisper:
        condition: service_healthy
      openedai-speech:
        condition: service_healthy
    networks:
      - ai-stack

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:latest
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: Bearer $OPEN_TERMINAL_API_KEY\" http://localhost:8000/api/config > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-stack

  dashboard:
    build: ./dashboard
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - OPEN_WEBUI_URL=http://open-webui:8080
      - SEARXNG_URL=http://searxng:8080
      - WHISPER_URL=http://faster-whisper:8000
      - TTS_URL=http://openedai-speech:8000
      - OLLAMA_URL=http://host.docker.internal:11434
      - MLX_URL=http://host.docker.internal:5001
      - MCP_FS_URL=http://host.docker.internal:8901
      - OPEN_TERMINAL_URL=http://open-terminal:8000
      - OPEN_TERMINAL_KEY=${OPEN_TERMINAL_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-stack

# =============================================================================
volumes:
  open-webui-data:
  openedai-speech-voices:
  openedai-speech-config:

networks:
  ai-stack:
    driver: bridge
